name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 分平台原生构建：CLI 裸归档 + fyne package 官方 GUI 包。
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            gui: true
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            gui: false # ubuntu amd64 上 CGO 交叉编 GUI 不可靠
          - os: macos-latest
            goos: darwin
            goarch: arm64
            gui: true
          - os: macos-latest
            goos: darwin
            goarch: amd64
            gui: true
          - os: windows-latest
            goos: windows
            goarch: amd64
            gui: true
            exe: .exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Linux Fyne / GLFW build deps
        if: runner.os == 'Linux' && matrix.gui
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc libgl1-mesa-dev xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install Windows MinGW (CGO)
        if: runner.os == 'Windows' && matrix.gui
        run: choco install mingw -y

      - name: Build binaries
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          EXT="${{ matrix.exe }}"
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/loveloki/try/internal/cli.version=${VERSION}" \
            -o "dist/try${EXT}" ./cmd/try
          if [ "${{ matrix.gui }}" = "true" ]; then
            WINFLAGS=""
            if [ "${{ matrix.goos }}" = "windows" ]; then
              WINFLAGS="-H=windowsgui"
            fi
            CGO_ENABLED=1 go build -trimpath \
              -ldflags "-s -w ${WINFLAGS}" \
              -o "dist/try-gui${EXT}" ./cmd/try-gui
          fi
          ls -la dist

      - name: Install fyne CLI
        if: matrix.gui
        shell: bash
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package GUI (fyne package)
        if: matrix.gui
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          command -v fyne
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/package-gui.sh "${{ matrix.goos }}" "${{ matrix.goarch }}" "$VERSION"

      - name: Package CLI archive
        shell: bash
        run: |
          set -euo pipefail
          EXT="${{ matrix.exe }}"
          OUT="try_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          FILES=("try${EXT}")
          if [ -f "try-gui${EXT}" ]; then
            FILES+=("try-gui${EXT}")
          fi
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            tar -a -cf "${OUT}.zip" "${FILES[@]}"
          else
            tar -czf "${OUT}.tar.gz" "${FILES[@]}"
          fi
          ls -la

      - name: Upload CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/try_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

      - name: Upload GUI package
        if: matrix.gui
        uses: actions/upload-artifact@v7
        with:
          name: release-gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/try-gui_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum try_* > checksums.txt
          if ls try-gui_* >/dev/null 2>&1; then
            sha256sum try-gui_* >> checksums.txt
          fi
          ls -la
          cat checksums.txt

      - name: Generate changelog
        run: |
          set -euo pipefail
          chmod +x scripts/changelog.sh
          ./scripts/changelog.sh "${GITHUB_REF_NAME}" > RELEASE_BODY.md
          cat RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: RELEASE_BODY.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
