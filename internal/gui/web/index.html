<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Try</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app" class="window" tabindex="0">
    <header class="chrome">
      <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>
      <h1 id="title" class="chrome-title">Try Directory Selection</h1>
      <button type="button" id="theme-btn" class="icon-btn" aria-label="Toggle theme" title="Theme">◐</button>
    </header>

    <section id="view-selector" class="view">
      <div class="toolbar">
        <label class="search-wrap">
          <span id="search-prefix" class="muted">Search:</span>
          <input id="search" type="text" autocomplete="off" spellcheck="false"
                 placeholder="Type to filter or create..." />
        </label>
        <nav id="source-tabs" class="tabs" role="tablist">
          <button type="button" data-source="all" class="tab active" role="tab">all</button>
          <button type="button" data-source="tries" class="tab" role="tab">tries</button>
          <button type="button" data-source="ship" class="tab" role="tab">ship</button>
          <button type="button" data-source="bug" class="tab" role="tab">bug</button>
        </nav>
      </div>
      <div id="entry-list" class="list" role="listbox" aria-label="Directories"></div>
      <footer id="selector-footer" class="footer">
        <div id="inline-input" class="inline-input hidden">
          <span id="inline-label" class="accent"></span>
          <input id="inline-field" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div id="hint-bar" class="hint muted"></div>
      </footer>
    </section>

    <section id="view-files" class="view hidden">
      <div class="toolbar files-toolbar">
        <button type="button" id="files-back" class="icon-btn" aria-label="Back">←</button>
        <nav id="breadcrumb" class="breadcrumb" aria-label="Path"></nav>
        <button type="button" id="files-delete" class="btn danger-outline hidden">Delete</button>
      </div>
      <div id="file-list" class="list" role="listbox" aria-label="Files"></div>
      <footer class="footer">
        <div id="files-hint" class="hint muted">Enter: Open  Esc: Back  Del: Delete</div>
      </footer>
    </section>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2 id="modal-title"></h2>
        <p id="modal-body" class="modal-body"></p>
        <div id="modal-extra" class="modal-extra hidden"></div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="button" id="modal-ok" class="btn danger">OK</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
